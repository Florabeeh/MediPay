<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#f7fbff" />
    <meta name="description" content="MediPay — Medical bill payments across Nigeria, powered by Circle on ARC Testnet" />
    <title>MediPay</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;500;600;700;800;900&family=Quicksand:wght@500;600;700&display=swap" rel="stylesheet" />
    <style>
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
      body { background: #f7fbff; color: #25364b; -webkit-font-smoothing: antialiased; font-family: Nunito, system-ui, -apple-system, sans-serif; }
      @keyframes spin { to { transform: rotate(360deg); } }
      select option { background: #ffffff; color: #25364b; }
      input::placeholder { color: #9aacbd; }
      input:focus, select:focus, textarea:focus { border-color: #3fb7a3 !important; box-shadow: 0 0 0 4px rgba(63,183,163,0.14); }
      button:focus-visible { outline: 2px solid #3fb7a3; outline-offset: 2px; }
      ::-webkit-scrollbar { width: 6px; }
      ::-webkit-scrollbar-track { background: #f7fbff; }
      ::-webkit-scrollbar-thumb { background: #c7d9e6; border-radius: 3px; }
    </style>
  </head>
  <body>
    <noscript>You need to enable JavaScript to run MediPay.</noscript>
    <div id="root"></div>
  </body>
</html>
