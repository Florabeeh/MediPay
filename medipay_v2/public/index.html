<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#f7fbff" />
    <meta name="description" content="MediPay — Medical bill payments across Nigeria, powered by Circle on ARC Testnet" />
    <title>MediPay</title>
    <style>
      @font-face { font-family: 'Borgen'; src: url('/fonts/Borgen-Regular.woff2') format('woff2'); font-weight: 400; font-style: normal; font-display: swap; }
      @font-face { font-family: 'Borgen'; src: url('/fonts/Borgen-Italic.woff2') format('woff2'); font-weight: 400; font-style: italic; font-display: swap; }
      @font-face { font-family: 'Borgen'; src: url('/fonts/Borgen-Bold.woff2') format('woff2'); font-weight: 700; font-style: normal; font-display: swap; }
      @font-face { font-family: 'Borgen'; src: url('/fonts/Borgen-BoldItalic.woff2') format('woff2'); font-weight: 700; font-style: italic; font-display: swap; }
    </style>
    <style>
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
      body { background: #f7fbff; color: #25364b; -webkit-font-smoothing: antialiased; font-family: "Borgen", system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
      @keyframes spin { to { transform: rotate(360deg); } }
      select option { background: #ffffff; color: #25364b; }
      input::placeholder { color: #9aacbd; }
      input:focus, select:focus, textarea:focus { border-color: #3fb7a3 !important; box-shadow: 0 0 0 4px rgba(63,183,163,0.14); }
      button:focus-visible { outline: 2px solid #3fb7a3; outline-offset: 2px; }
      ::-webkit-scrollbar { width: 6px; }
      ::-webkit-scrollbar-track { background: #f7fbff; }
      ::-webkit-scrollbar-thumb { background: #c7d9e6; border-radius: 3px; }
    </style>
  </head>
  <body>
    <noscript>You need to enable JavaScript to run MediPay.</noscript>
    <div id="root"></div>
  </body>
</html>
