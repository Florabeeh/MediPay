<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#0d1117" />
    <meta name="description" content="MediPay — Medical bill payments across Nigeria, powered by Circle on ARC Testnet" />
    <title>MediPay</title>
    <style>
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
      body { background: #0d1117; color: #e5e7eb; -webkit-font-smoothing: antialiased; }
      @keyframes spin { to { transform: rotate(360deg); } }
      select option { background: #111827; color: #e5e7eb; }
      input::placeholder { color: #6b7280; }
      input:focus, select:focus, textarea:focus { border-color: #1a9e5f !important; box-shadow: 0 0 0 3px rgba(26,158,95,0.15); }
      button:focus-visible { outline: 2px solid #1a9e5f; outline-offset: 2px; }
      ::-webkit-scrollbar { width: 6px; }
      ::-webkit-scrollbar-track { background: #0d1117; }
      ::-webkit-scrollbar-thumb { background: #374151; border-radius: 3px; }
    </style>
  </head>
  <body>
    <noscript>You need to enable JavaScript to run MediPay.</noscript>
    <div id="root"></div>
  </body>
</html>
